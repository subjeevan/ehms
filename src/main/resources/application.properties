spring.application.name=ehms
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/hms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
spring.datasource.username=hms_user
spring.datasource.password=Hms@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tokyo

# JWT
app.jwt.secret=this-is-a-very-long-ehms-jwt-secret-key-with-more-than-32-characters
app.jwt.expiration-minutes=120

# React/Vite frontend
app.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.root=INFO
logging.level.kcg.edu.ehms=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/ehms.log